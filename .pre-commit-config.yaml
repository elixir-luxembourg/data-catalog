repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.15.0
    hooks:
      - id: eslint
        files: datacatalog/static/vendor/components/.*\.jsx?$
        types: [file]
        additional_dependencies:
          - eslint@8.15.0
          - eslint-plugin-react@7.29.4
